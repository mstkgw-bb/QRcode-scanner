<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F6E56">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>試薬スキャナー</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --green:#1D9E75;--green-dark:#0F6E56;--green-light:#E1F5EE;
    --gray-50:#F8F8F7;--gray-100:#EDEDEB;--gray-300:#C4C3BC;
    --gray-500:#888780;--gray-700:#444441;--gray-900:#1A1A18;
    --red:#E24B4A;--amber:#BA7517;
    --radius:10px;--radius-sm:6px;
  }
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:var(--gray-50);color:var(--gray-900);
    min-height:100dvh;padding:0;
  }
  header{
    background:#fff;border-bottom:0.5px solid var(--gray-100);
    padding:14px 16px 12px;display:flex;align-items:center;gap:10px;
    position:sticky;top:0;z-index:10;
  }
  header svg{flex-shrink:0;color:var(--green-dark)}
  header h1{font-size:17px;font-weight:600;letter-spacing:-0.2px}
  header p{font-size:12px;color:var(--gray-500);margin-top:1px}
  #version-badge{
    margin-left:auto;font-size:11px;color:var(--gray-300);
    font-variant-numeric:tabular-nums;flex-shrink:0;
  }
  main{padding:14px 16px;display:flex;flex-direction:column;gap:14px;max-width:540px;margin:0 auto}

  .card{background:#fff;border-radius:var(--radius);border:0.5px solid var(--gray-100);overflow:hidden}
  .card-header{padding:12px 14px 10px;border-bottom:0.5px solid var(--gray-100);display:flex;align-items:center;gap:8px}
  .card-header span{font-size:13px;font-weight:500;color:var(--gray-700)}
  .badge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:var(--green);color:#fff;font-size:11px;font-weight:700}

  #search-row{display:flex;gap:8px;padding:12px 14px}
  #target-input{
    flex:1;height:38px;border:0.5px solid var(--gray-300);border-radius:var(--radius-sm);
    padding:0 12px;font-size:14px;outline:none;background:#fff;
    transition:border-color .15s;
  }
  #target-input:focus{border-color:var(--green)}
  #add-btn{
    height:38px;padding:0 16px;border-radius:var(--radius-sm);
    background:var(--green);color:#fff;border:none;
    font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;
    display:flex;align-items:center;gap:6px;transition:background .15s;
  }
  #add-btn:active{background:var(--green-dark)}
  #target-list{padding:0 14px 12px;display:flex;flex-wrap:wrap;gap:6px;min-height:0}
  .target-tag{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--green-light);color:var(--green-dark);
    border:0.5px solid #9FE1CB;border-radius:20px;
    font-size:12px;font-weight:500;padding:4px 10px 4px 8px;
  }
  .target-tag button{
    background:none;border:none;cursor:pointer;padding:0;line-height:1;
    color:#5DCAA5;font-size:15px;display:flex;align-items:center;
  }
  .target-tag button:hover{color:var(--green-dark)}

  #cam-wrap{
    position:relative;background:#111;
    aspect-ratio:4/3;overflow:hidden;
  }
  #video{width:100%;height:100%;object-fit:cover;display:block}
  #overlay{position:absolute;inset:0;pointer-events:none;width:100%;height:100%}
  #cam-placeholder{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:10px;
    background:#0a0a0a;color:var(--gray-500);
  }
  #cam-placeholder svg{opacity:0.4}
  #cam-placeholder p{font-size:13px}

  .cam-controls{padding:12px 14px;display:flex;gap:8px}
  #start-btn,#stop-btn{
    flex:1;height:40px;border-radius:var(--radius-sm);
    font-size:14px;font-weight:500;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:7px;
    transition:all .15s;border:none;
  }
  #start-btn{background:var(--green);color:#fff}
  #start-btn:active{background:var(--green-dark)}
  #stop-btn{background:var(--gray-100);color:var(--gray-700)}
  #stop-btn:active{background:var(--gray-300)}
  #clear-btn{
    height:40px;padding:0 14px;border-radius:var(--radius-sm);
    background:none;border:0.5px solid var(--gray-300);color:var(--gray-500);
    font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;
  }
  #clear-btn:active{background:var(--gray-100)}

  #status-bar{
    margin:0 14px 12px;border-radius:var(--radius-sm);
    padding:10px 12px;display:flex;align-items:center;gap:8px;
    background:var(--gray-50);border:0.5px solid var(--gray-100);
    font-size:13px;color:var(--gray-500);min-height:38px;
    transition:all .3s;
  }
  #status-bar.found{background:var(--green-light);border-color:#9FE1CB;color:var(--green-dark)}
  #status-bar.scanning{background:#EAF3DE;border-color:#C0DD97;color:#3B6D11}
  #status-dot{
    width:8px;height:8px;border-radius:50%;background:var(--gray-300);
    flex-shrink:0;transition:background .3s;
  }
  #status-bar.found #status-dot{background:var(--green);box-shadow:0 0 0 3px rgba(29,158,117,0.25)}
  #status-bar.scanning #status-dot{background:#639922;animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

  #history-section{padding:0 14px 12px}
  #history-section p.label{font-size:12px;color:var(--gray-500);margin-bottom:6px}
  #history-list{display:flex;flex-wrap:wrap;gap:6px}
  .history-tag{
    display:inline-flex;align-items:center;gap:5px;
    background:#fff;border:0.5px solid var(--gray-100);
    border-radius:20px;font-size:12px;color:var(--gray-700);padding:4px 10px;
  }
  .history-tag.is-target{
    background:var(--green-light);border-color:#9FE1CB;color:var(--green-dark);font-weight:500;
  }
  .history-tag svg{flex-shrink:0}

  #scan-guide{
    position:absolute;inset:0;pointer-events:none;
    display:flex;align-items:center;justify-content:center;
  }
  .guide-frame{display:none}

  /* ── フルスクリーンカメラ ── */
  #cam-wrap.fullscreen{
    position:fixed;inset:0;z-index:100;
    aspect-ratio:unset;border-radius:0;
  }
  body.cam-open{overflow:hidden}

  #fs-bar{
    display:none;position:absolute;inset:0;
    flex-direction:column;justify-content:space-between;
    pointer-events:none;
  }
  #cam-wrap.fullscreen #fs-bar{display:flex}

  /* カウンター（中央大表示） */
  #fs-counter{
    pointer-events:none;
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    display:flex;flex-direction:column;align-items:center;gap:6px;
    opacity:0;transition:opacity .3s;
  }
  #cam-wrap.fullscreen #fs-counter{opacity:1}
  #fs-count-num{
    font-size:80px;font-weight:700;color:#fff;line-height:1;
    text-shadow:0 2px 24px rgba(0,0,0,0.6);
    font-variant-numeric:tabular-nums;
  }
  #fs-count-num.found{color:#4DEDA0}
  #fs-count-label{
    font-size:14px;color:rgba(255,255,255,0.85);
    background:rgba(0,0,0,0.45);border-radius:20px;
    padding:4px 14px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  }
  #fs-frame-count{
    font-size:12px;color:rgba(255,255,255,0.55);
    background:rgba(0,0,0,0.3);border-radius:12px;
    padding:3px 10px;
  }
  #fs-mode{
    font-size:11px;color:rgba(255,255,255,0.45);letter-spacing:.3px;
  }

  #fs-status{
    pointer-events:none;
    margin:16px;
    margin-top:max(16px, calc(env(safe-area-inset-top) + 8px));
    background:rgba(0,0,0,0.55);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border-radius:var(--radius-sm);padding:10px 12px;
    display:flex;align-items:center;gap:8px;
    font-size:13px;color:#fff;
  }
  #fs-status.found{background:rgba(15,110,86,0.88)}
  #fs-dot{
    width:8px;height:8px;border-radius:50%;
    background:rgba(255,255,255,0.4);flex-shrink:0;transition:background .3s;
  }
  #fs-status.found #fs-dot{background:#4DEDA0;box-shadow:0 0 0 3px rgba(77,237,160,0.3)}
  #fs-status.scanning #fs-dot{background:#8ED446;animation:pulse 1.5s infinite}

  #fs-btns{
    pointer-events:auto;display:flex;gap:8px;
    padding:16px;
    padding-bottom:max(16px, calc(env(safe-area-inset-bottom) + 8px));
  }
  #fs-stop-btn{
    flex:1;height:50px;border-radius:var(--radius);
    background:rgba(255,255,255,0.15);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    color:#fff;border:0.5px solid rgba(255,255,255,0.25);
    font-size:15px;font-weight:500;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:7px;
  }
  #fs-stop-btn:active{background:rgba(255,255,255,0.28)}
  #fs-clear-btn{
    height:50px;padding:0 18px;border-radius:var(--radius);
    background:rgba(255,255,255,0.08);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    color:rgba(255,255,255,0.65);border:0.5px solid rgba(255,255,255,0.15);
    font-size:13px;cursor:pointer;
    display:flex;align-items:center;gap:6px;
  }
  #fs-clear-btn:active{background:rgba(255,255,255,0.18)}
</style>
</head>
<body>

<header>
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2v-4M9 21H5a2 2 0 0 1-2-2v-4m0 0h18"/>
  </svg>
  <div>
    <h1>試薬スキャナー</h1>
    <p>QRコードで目的の試薬を素早く発見</p>
  </div>
  <span id="version-badge"></span>
</header>

<main>
  <div class="card">
    <div class="card-header">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--green)"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <span>検索する試薬を登録</span>
    </div>
    <div id="search-row">
      <input type="text" id="target-input" placeholder="試薬ID（例: REAGENT-042）" autocomplete="off" autocorrect="off" spellcheck="false">
      <button id="add-btn" onclick="addTarget()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        追加
      </button>
    </div>
    <div id="target-list"></div>
  </div>

  <div class="card">
    <div id="cam-wrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <div id="cam-placeholder">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        <p>カメラを起動してください</p>
      </div>
      <div id="scan-guide" style="display:none">
        <div class="guide-frame">
          <div class="guide-corner tl"></div>
          <div class="guide-corner tr"></div>
          <div class="guide-corner bl"></div>
          <div class="guide-corner br"></div>
        </div>
      </div>
      <div id="fs-bar">
        <div id="fs-status">
          <div id="fs-dot"></div>
          <span id="fs-text">スキャン中...</span>
        </div>
        <div id="fs-counter">
          <div id="fs-count-num">0</div>
          <div id="fs-count-label">件スキャン済み</div>
          <div id="fs-frame-count">このフレーム: 0件</div>
          <div id="fs-mode">-</div>
        </div>
        <div id="fs-btns">
          <button id="fs-stop-btn" onclick="stopCamera()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            停止
          </button>
          <button id="fs-clear-btn" onclick="clearAll()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
            リセット
          </button>
        </div>
      </div>
    </div>
    <div class="cam-controls">
      <button id="start-btn" onclick="startCamera()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        カメラ起動
      </button>
      <button id="stop-btn" onclick="stopCamera()" style="display:none">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        停止
      </button>
      <button id="clear-btn" onclick="clearAll()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        リセット
      </button>
    </div>
    <div id="status-bar">
      <div id="status-dot"></div>
      <span id="status-text">カメラを起動してスキャンを開始してください</span>
    </div>
    <div id="history-section" style="display:none">
      <p class="label">検出履歴</p>
      <div id="history-list"></div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script type="module">
  try {
    const { scanImageData } = await import('https://esm.sh/@undecaf/zbar-wasm');
    window.__zbarScan = scanImageData;
  } catch(e) {
    window.__zbarError = String(e);
  }
</script>
<script>
const VERSION = 'v2.3';
document.getElementById('version-badge').textContent = VERSION;

let stream = null, animId = null, renderAnimId = null;
let targets = new Set();
let history = new Map();
let lastFoundCode = null;
const SCAN_INTERVAL = 250;
const PERSIST_MS = 1500; // 検出後この時間フレームを表示し続ける

// AR用: 検出済みコードの最終位置を保持
const persistent = new Map(); // data → {points, lastSeen, isTarget}

const video = document.getElementById('video');
const overlayCanvas = document.getElementById('overlay');
const ctx = overlayCanvas.getContext('2d');
const scanCanvas = document.createElement('canvas');
const scanCtx = scanCanvas.getContext('2d');

function addTarget() {
  const val = document.getElementById('target-input').value.trim();
  if (!val) return;
  targets.add(val);
  document.getElementById('target-input').value = '';
  renderTargets();
  if (stream) setStatus('スキャン中... ' + targets.size + '件の試薬を検索しています', 'scanning');
}

function removeTarget(val) {
  targets.delete(val);
  renderTargets();
}

function renderTargets() {
  const list = document.getElementById('target-list');
  list.innerHTML = '';
  if (targets.size === 0) { list.style.display = 'none'; return; }
  list.style.display = 'flex';
  targets.forEach(t => {
    const tag = document.createElement('span');
    tag.className = 'target-tag';
    tag.innerHTML = `
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2v-4M9 21H5a2 2 0 0 1-2-2v-4m0 0h18"/></svg>
      ${escHtml(t)}
      <button onclick="removeTarget('${escAttr(t)}')" title="削除">×</button>
    `;
    list.appendChild(tag);
  });
}

function clearAll() {
  targets.clear();
  history.clear();
  persistent.clear();
  lastFoundCode = null;
  renderTargets();
  renderHistory();
  updateFsCount();
  setStatus('カメラを起動してスキャンを開始してください', '');
}

async function startCamera() {
  if (stream) return;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 640 }, height: { ideal: 480 } }
    });
    video.srcObject = stream;
    await video.play();
    document.getElementById('cam-placeholder').style.display = 'none';
    document.getElementById('scan-guide').style.display = 'flex';
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('stop-btn').style.display = '';
    document.getElementById('cam-wrap').classList.add('fullscreen');
    document.body.classList.add('cam-open');
    setStatus(targets.size > 0 ? 'スキャン中... ' + targets.size + '件の試薬を検索しています' : 'QRコードをスキャン中...', 'scanning');
    renderLoop(); // 60fps 描画ループ開始
    scanLoop();   // 検出ループ開始
  } catch(e) {
    setStatus('カメラへのアクセスが許可されていません', '');
    document.getElementById('cam-placeholder').innerHTML = '<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.4"><path d="M1 1l22 22M17 17H3a2 2 0 0 1-2-2V7m5-3h9l2 3h3a2 2 0 0 1 2 2v9.34"/><circle cx="12" cy="12" r="4"/></svg><p style="font-size:13px">カメラのアクセスを許可してください</p>';
    document.getElementById('cam-placeholder').style.display = 'flex';
  }
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  clearTimeout(animId);
  cancelAnimationFrame(renderAnimId);
  persistent.clear();
  video.srcObject = null;
  ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
  document.getElementById('cam-placeholder').style.display = 'flex';
  document.getElementById('scan-guide').style.display = 'none';
  document.getElementById('start-btn').style.display = '';
  document.getElementById('stop-btn').style.display = 'none';
  document.getElementById('cam-wrap').classList.remove('fullscreen');
  document.body.classList.remove('cam-open');
  setStatus('停止しました', '');
}

// 60fps 描画ループ（検出位置を滑らかに表示）
function renderLoop() {
  const dw = overlayCanvas.width, dh = overlayCanvas.height;
  ctx.clearRect(0, 0, dw, dh);
  const now = Date.now();
  for (const [data, entry] of persistent) {
    const age = now - entry.lastSeen;
    if (age > PERSIST_MS) { persistent.delete(data); continue; }
    // 最後の 30% でフェードアウト
    const alpha = age < PERSIST_MS * 0.7 ? 1 : 1 - (age - PERSIST_MS * 0.7) / (PERSIST_MS * 0.3);
    drawHighlight(entry.points, data, entry.isTarget, dw, alpha);
  }
  renderAnimId = requestAnimationFrame(renderLoop);
}

async function scanLoop() {
  if (!stream) return;
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    const dw = video.clientWidth, dh = video.clientHeight;
    if (overlayCanvas.width !== dw || overlayCanvas.height !== dh) {
      overlayCanvas.width = dw; overlayCanvas.height = dh;
    }

    // object-fit:cover と同じクロップをスキャン用キャンバス（半サイズ）に適用
    const vw = video.videoWidth, vh = video.videoHeight;
    const scale = Math.max(dw / vw, dh / vh);
    const cropW = dw / scale, cropH = dh / scale;
    const cropX = (vw - cropW) / 2, cropY = (vh - cropH) / 2;
    const sw = dw >> 1, sh = dh >> 1;
    if (scanCanvas.width !== sw || scanCanvas.height !== sh) {
      scanCanvas.width = sw; scanCanvas.height = sh;
    }
    scanCtx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, sw, sh);

    let codes = [];
    let usedMethod = '';

    // ① ZBar WASM: 1回のスキャンで全QRを同時検出
    const zbarScan = window.__zbarScan;
    if (zbarScan) {
      try {
        const imgData = scanCtx.getImageData(0, 0, sw, sh);
        const symbols = await zbarScan(imgData);
        codes = symbols.map(s => ({
          data: s.decode(),
          points: s.points.map(p => ({ x: p.x * 2, y: p.y * 2 }))
        }));
        usedMethod = `ZBar (${codes.length}件)`;
      } catch(e) {
        usedMethod = 'ZBar失敗';
      }
    }

    // ② フォールバック: jsQR で 5×8=40 グリッドスキャン
    if (!zbarScan || usedMethod === 'ZBar失敗') {
      const COLS = 5, ROWS = 8;
      const cw = Math.ceil(sw * 0.45), ch = Math.ceil(sh * 0.27);
      const found = new Map();
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const x = Math.round(c * (sw - cw) / (COLS - 1));
          const y = Math.round(r * (sh - ch) / (ROWS - 1));
          const imgData = scanCtx.getImageData(x, y, cw, ch);
          const raw = jsQR(imgData.data, cw, ch, { inversionAttempts: 'dontInvert' });
          if (raw && !found.has(raw.data)) {
            const s = p => ({ x: (p.x + x) * 2, y: (p.y + y) * 2 });
            found.set(raw.data, { data: raw.data, points: [
              s(raw.location.topLeftCorner), s(raw.location.topRightCorner),
              s(raw.location.bottomRightCorner), s(raw.location.bottomLeftCorner)
            ]});
          }
        }
      }
      codes = Array.from(found.values());
      const errInfo = window.__zbarError ? 'ZBarエラー' : (window.__zbarScan === undefined ? 'ZBar読込中...' : 'ZBar失敗');
      usedMethod = zbarScan ? 'ZBar失敗→jsQR40' : errInfo + `→jsQR40 (${codes.length}件)`;
    }

    document.getElementById('fs-frame-count').textContent = `このフレーム: ${codes.length}件`;
    document.getElementById('fs-mode').textContent = usedMethod;

    // persistent を更新（描画は renderLoop が担当）
    const now = Date.now();
    for (const code of codes) {
      const isTarget = targets.size === 0 || targets.has(code.data);
      persistent.set(code.data, { points: code.points, lastSeen: now, isTarget });
      addHistory(code.data, isTarget);
    }

    const foundTarget = codes.find(c => targets.size === 0 || targets.has(c.data));
    if (foundTarget) {
      if (foundTarget.data !== lastFoundCode) {
        lastFoundCode = foundTarget.data;
        setStatus('発見！ → ' + foundTarget.data, 'found');
        if (navigator.vibrate) navigator.vibrate([80, 40, 80]);
      } else {
        setStatus('発見！ → ' + foundTarget.data, 'found');
      }
    } else if (codes.length > 0) {
      lastFoundCode = null;
      setStatus('検出: ' + codes.length + '件 (対象外)', 'scanning');
    } else {
      lastFoundCode = null;
      setStatus(targets.size > 0
        ? 'スキャン中... ' + targets.size + '件の試薬を検索しています'
        : 'QRコードをスキャン中...', 'scanning');
    }
  }
  animId = setTimeout(scanLoop, SCAN_INTERVAL);
}

function drawHighlight(points, data, isTarget, w, alpha = 1) {
  const c = ctx;
  c.globalAlpha = alpha;
  const [tl, tr, br, bl] = points;

  // 枠線
  c.beginPath();
  c.moveTo(tl.x,tl.y); c.lineTo(tr.x,tr.y); c.lineTo(br.x,br.y); c.lineTo(bl.x,bl.y);
  c.closePath();
  if (isTarget) {
    c.fillStyle = 'rgba(29,158,117,0.2)';
    c.fill();
    c.strokeStyle = '#1D9E75';
    c.lineWidth = Math.max(3, w * 0.004);
  } else {
    c.strokeStyle = 'rgba(255,255,255,0.7)';
    c.lineWidth = Math.max(1.5, w * 0.002);
  }
  c.stroke();

  // ラベル（全QRに表示）
  const cx = (tl.x + tr.x) / 2;
  const cy = tl.y - w * 0.015;
  const label = (isTarget ? '✓ ' : '') + data;
  const fs = Math.max(12, w * 0.02);
  c.font = `600 ${fs}px -apple-system,sans-serif`;
  const tw = c.measureText(label).width;
  const pad = 8, ph = fs * 1.4;
  c.fillStyle = isTarget ? '#0F6E56' : 'rgba(0,0,0,0.6)';
  roundRect(c, cx - tw/2 - pad, cy - ph * 0.75, tw + pad * 2, ph, 5);
  c.fill();
  c.fillStyle = '#fff';
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillText(label, cx, cy - ph * 0.75 + ph / 2);
  c.textAlign = 'left'; c.textBaseline = 'alphabetic';
  c.globalAlpha = 1;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function addHistory(code, isTarget) {
  if (!history.has(code)) {
    history.set(code, isTarget);
    renderHistory();
    updateFsCount();
  }
}

function updateFsCount() {
  const total = history.size;
  const matched = targets.size > 0
    ? [...history.values()].filter(Boolean).length
    : total;
  const numEl = document.getElementById('fs-count-num');
  const lblEl = document.getElementById('fs-count-label');
  if (targets.size > 0) {
    numEl.textContent = matched + ' / ' + targets.size;
    lblEl.textContent = matched >= targets.size ? '全件発見！' : '件発見';
    numEl.className = matched >= targets.size ? 'found' : '';
  } else {
    numEl.textContent = total;
    lblEl.textContent = '件スキャン済み';
    numEl.className = total > 0 ? 'found' : '';
  }
}

function renderHistory() {
  const section = document.getElementById('history-section');
  const list = document.getElementById('history-list');
  if (history.size === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  list.innerHTML = '';
  history.forEach((isTarget, code) => {
    const tag = document.createElement('span');
    tag.className = 'history-tag' + (isTarget ? ' is-target' : '');
    tag.innerHTML = isTarget
      ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>${escHtml(code)}`
      : `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>${escHtml(code)}`;
    list.appendChild(tag);
  });
}

function setStatus(msg, type) {
  const bar = document.getElementById('status-bar');
  bar.className = type ? type : '';
  document.getElementById('status-text').textContent = msg;
  const fs = document.getElementById('fs-status');
  fs.className = type ? type : '';
  document.getElementById('fs-text').textContent = msg;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function escAttr(s) { return s.replace(/'/g,"\\'") }

document.getElementById('target-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTarget();
});
</script>
